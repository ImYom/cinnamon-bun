<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mmmmmmmmm Cinnabon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #fdf3e3;
    --dough: #d4924d;
    --cinn: #8b4513;
    --dark: #2c1a08;
    --accent: #c8832a;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--cream);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(212,146,77,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .ring {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    border: 1px solid rgba(200,131,42,0.15);
    animation: spin linear infinite;
  }
  .ring:nth-child(1) { width: 700px; height: 700px; top:50%; left:50%; margin:-350px; animation-duration: 90s; }
  .ring:nth-child(2) { width: 500px; height: 500px; top:50%; left:50%; margin:-250px; animation-duration: 60s; animation-direction: reverse; border-style: dashed; border-color: rgba(139,69,19,0.1); }
  .ring:nth-child(3) { width: 300px; height: 300px; top:50%; left:50%; margin:-150px; animation-duration: 40s; border-color: rgba(200,131,42,0.12); }
  @keyframes spin { to { transform: rotate(360deg); } }

  .corner {
    position: fixed;
    font-size: 2rem;
    color: rgba(200,131,42,0.2);
    font-family: 'Playfair Display', serif;
    line-height: 1;
    pointer-events: none;
  }
  .corner.tl { top: 16px; left: 20px; }
  .corner.tr { top: 16px; right: 20px; transform: scaleX(-1); }
  .corner.bl { bottom: 16px; left: 20px; transform: scaleY(-1); }
  .corner.br { bottom: 16px; right: 20px; transform: scale(-1); }

  /* hint text */
  .hint {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.58rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(139,69,19,0.3);
    white-space: nowrap;
    pointer-events: none;
    transition: opacity 0.6s;
  }

  .stage {
    position: relative;
    z-index: 1;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: grandEntrance 1.2s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes grandEntrance {
    from { opacity: 0; transform: scale(0.92) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .eyebrow {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(139,69,19,0.45);
    margin-bottom: 1.8rem;
    font-weight: 300;
    transition: opacity 0.3s;
  }

  /* Draggable bun */
  .bun-wrap {
    width: 160px;
    height: 160px;
    margin: 0 auto 1.6rem;
    position: relative;
    cursor: grab;
    animation: holyFloat 3.5s ease-in-out infinite;
    transition: filter 0.2s;
  }

  .bun-wrap.dragging {
    animation: none;
    cursor: grabbing;
    filter: drop-shadow(0 12px 24px rgba(139,69,19,0.25));
  }

  .bun-wrap:active { cursor: grabbing; }

  @keyframes holyFloat {
    0%,100% { transform: translateY(0) rotate(-1deg); }
    50%      { transform: translateY(-8px) rotate(1deg); }
  }

  @keyframes shake {
    0%,100% { transform: rotate(0deg); }
    15% { transform: rotate(-12deg) scale(1.08); }
    30% { transform: rotate(10deg) scale(1.08); }
    45% { transform: rotate(-8deg); }
    60% { transform: rotate(6deg); }
    75% { transform: rotate(-3deg); }
  }

  .bun-wrap.shaking { animation: shake 0.5s ease both; }

  @keyframes nomnom {
    0%   { transform: scale(1); }
    25%  { transform: scale(1.18) rotate(-3deg); }
    50%  { transform: scale(0.92) rotate(2deg); }
    75%  { transform: scale(1.08) rotate(-1deg); }
    100% { transform: scale(1); }
  }
  .bun-wrap.nomming { animation: nomnom 0.4s ease both; }

  .steam {
    position: absolute;
    top: -32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    pointer-events: none;
  }

  .s {
    width: 2px;
    border-radius: 2px;
    background: linear-gradient(to top, rgba(200,131,42,0.6), transparent);
    animation: steamUp 2.2s ease-in-out infinite;
  }
  .s:nth-child(1) { height: 20px; animation-delay: 0s; }
  .s:nth-child(2) { height: 28px; animation-delay: 0.5s; }
  .s:nth-child(3) { height: 18px; animation-delay: 1s; }

  @keyframes steamUp {
    0%   { opacity: 0; transform: translateY(0) scaleX(1); }
    50%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-20px) scaleX(1.5); }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    width: min(320px, 80vw);
    margin: 1.4rem auto 1.2rem;
    pointer-events: none;
  }
  .div-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, rgba(200,131,42,0.35), transparent); }
  .div-orn { color: var(--accent); font-size: 0.9rem; opacity: 0.6; }

  .headline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(2rem, 8vw, 3.4rem);
    color: var(--cinn);
    line-height: 1.05;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }

  .headline:hover { transform: scale(1.02); }
  .headline:active { transform: scale(0.98); }

  .headline .mmm {
    color: var(--dough);
    display: inline-block;
    transition: letter-spacing 0.3s ease;
  }

  .headline .brand { color: var(--dark); }

  .footer-text {
    margin-top: 1.8rem;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(44,26,8,0.25);
    font-weight: 300;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  /* Floating m particles */
  .particle {
    position: fixed;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    color: var(--dough);
    pointer-events: none;
    z-index: 999;
    animation: floatUp 1.4s ease-out forwards;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
    100% { opacity: 0; transform: translateY(-120px) scale(0.4) rotate(var(--rot)); }
  }

  /* Frosting drip that appears on clicks */
  .drip {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #fff8ef;
    pointer-events: none;
    z-index: 998;
    animation: dripDown 1s ease-in forwards;
  }

  @keyframes dripDown {
    0%   { opacity: 0.9; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.3) translateY(60px); }
  }

  /* Glow on the bun when clicked a lot */
  .bun-wrap.glowing svg {
    filter: drop-shadow(0 0 16px rgba(212,146,77,0.6));
  }
</style>
</head>
<body>

<div class="ring"></div>
<div class="ring"></div>
<div class="ring"></div>

<div class="corner tl">❧</div>
<div class="corner tr">❧</div>
<div class="corner bl">❧</div>
<div class="corner br">❧</div>

<p class="hint" id="hint">click the bun · drag it · click the text</p>

<div class="stage" id="stage">

  <p class="eyebrow" id="eyebrow">An Important Scholarly Contribution</p>

  <div class="bun-wrap" id="bun">
    <div class="steam">
      <div class="s"></div>
      <div class="s"></div>
      <div class="s"></div>
    </div>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" width="160" height="160">
      <ellipse cx="100" cy="188" rx="65" ry="7" fill="rgba(139,69,19,0.1)"/>
      <ellipse cx="100" cy="108" rx="72" ry="64" fill="#d4924d"/>
      <ellipse cx="100" cy="85" rx="60" ry="46" fill="#e0a85e"/>
      <path d="M100,50 C138,50 165,70 165,100 C165,130 138,152 100,152 C62,152 35,130 35,100 C35,70 62,50 100,50 Z" fill="none" stroke="#8b4513" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
      <path d="M100,65 C130,65 150,80 150,100 C150,120 130,136 100,136 C70,136 50,120 50,100 C50,80 70,65 100,65 Z" fill="none" stroke="#7a3e10" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
      <path d="M100,78 C122,78 136,88 136,100 C136,112 122,122 100,122 C78,122 64,112 64,100 C64,88 78,78 100,78 Z" fill="none" stroke="#6b3610" stroke-width="4.5" stroke-linecap="round" opacity="0.5"/>
      <circle cx="100" cy="100" r="12" fill="#5c2d0b" opacity="0.7"/>
      <circle cx="100" cy="100" r="6" fill="#3d1d07" opacity="0.8"/>
      <path d="M68,72 Q80,62 95,68 Q108,74 100,82 Q92,90 108,88 Q124,86 118,76" fill="none" stroke="#fff8ef" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
      <path d="M115,115 Q128,108 132,120 Q136,132 120,128" fill="none" stroke="#fff8ef" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
      <ellipse cx="78" cy="72" rx="14" ry="8" fill="rgba(255,248,239,0.25)" transform="rotate(-20,78,72)"/>
    </svg>
  </div>

  <div class="divider">
    <div class="div-line"></div>
    <span class="div-orn">✦</span>
    <div class="div-line"></div>
  </div>

  <h1 class="headline" id="headline">
    <span class="mmm" id="mmm">mmmmmmmmm</span><br>
    <span class="brand">Cinnabon</span>
  </h1>

  <p class="footer-text" id="footer">est. a long time ago &nbsp;·&nbsp; warm always</p>

</div>

<script>
  const bun = document.getElementById('bun');
  const mmm = document.getElementById('mmm');
  const headline = document.getElementById('headline');
  const hint = document.getElementById('hint');
  const eyebrow = document.getElementById('eyebrow');
  const footer = document.getElementById('footer');

  let clickCount = 0;
  let mCount = 9;
  let isDragging = false;
  let dragOffX = 0, dragOffY = 0;
  let bunX = 0, bunY = 0;
  let hintHidden = false;

  const eyebrows = [
    'An Important Scholarly Contribution',
    'A Treatise On Warmth',
    'Peer-Reviewed & Frosted',
    'Presented With Great Solemnity',
    'The Pinnacle Of Human Achievement',
    'A Nobel-Worthy Discovery',
    'Endorsed By No One In Particular',
    'Still Warm, Still Perfect',
  ];

  const footers = [
    'est. a long time ago · warm always',
    'handle with care · very important',
    'do not microwave · unless you have to',
    'pairs well with everything · especially nothing',
    'freshly baked · spiritually speaking',
    'patent pending · on the spiral',
  ];

  function hideHint() {
    if (!hintHidden) {
      hint.style.opacity = '0';
      hintHidden = true;
    }
  }

  function spawnParticle(x, y) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 14 + Math.random() * 22;
    p.style.cssText = `left:${x}px;top:${y}px;font-size:${size}px;--rot:${(Math.random()-0.5)*40}deg`;
    p.textContent = 'm';
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1400);
  }

  function spawnDrip(x, y) {
    const d = document.createElement('div');
    d.className = 'drip';
    d.style.cssText = `left:${x + (Math.random()-0.5)*40}px;top:${y}px`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1000);
  }

  // Click bun — nom it, spawn particles, grow m's
  bun.addEventListener('click', (e) => {
    if (isDragging) return;
    hideHint();
    clickCount++;
    mCount = Math.min(mCount + 2, 40);
    mmm.textContent = 'm'.repeat(mCount);

    bun.classList.remove('nomming', 'shaking', 'glowing');
    void bun.offsetWidth;
    bun.classList.add('nomming');
    if (clickCount > 5) bun.classList.add('glowing');

    const rect = bun.getBoundingClientRect();
    for (let i = 0; i < 4; i++) {
      setTimeout(() => {
        spawnParticle(
          rect.left + 20 + Math.random() * (rect.width - 40),
          rect.top + 20 + Math.random() * (rect.height * 0.5)
        );
      }, i * 60);
    }
    spawnDrip(rect.left + rect.width/2, rect.top + rect.height * 0.7);

    if (clickCount % 4 === 0) {
      eyebrow.textContent = eyebrows[Math.floor(Math.random() * eyebrows.length)];
    }
  });

  // Click headline — shrink the m's back
  headline.addEventListener('click', (e) => {
    hideHint();
    mCount = Math.max(mCount - 3, 1);
    mmm.textContent = 'm'.repeat(mCount);
    clickCount = Math.max(0, clickCount - 3);
    if (clickCount <= 5) bun.classList.remove('glowing');

    footer.textContent = footers[Math.floor(Math.random() * footers.length)];

    // shake bun in protest
    bun.classList.remove('shaking');
    void bun.offsetWidth;
    bun.classList.add('shaking');
  });

  // Drag the bun
  bun.addEventListener('mousedown', startDrag);
  bun.addEventListener('touchstart', (e) => startDrag(e.touches[0]), { passive: true });

  function startDrag(e) {
    isDragging = false; // will become true on first move
    const rect = bun.getBoundingClientRect();
    dragOffX = e.clientX - rect.left - rect.width / 2;
    dragOffY = e.clientY - rect.top - rect.height / 2;
    bunX = rect.left + rect.width / 2 - window.innerWidth / 2;
    bunY = rect.top + rect.height / 2 - window.innerHeight / 2;

    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', endDrag);
    window.addEventListener('touchmove', (e) => onDrag(e.touches[0]), { passive: true });
    window.addEventListener('touchend', endDrag);
  }

  function onDrag(e) {
    if (!isDragging) {
      isDragging = true;
      bun.classList.add('dragging');
      hideHint();
    }
    const targetX = e.clientX - window.innerWidth / 2 - dragOffX;
    const targetY = e.clientY - window.innerHeight / 2 - dragOffY;
    bunX += (targetX - bunX) * 0.55;
    bunY += (targetY - bunY) * 0.55;
    bun.style.transform = `translate(${bunX}px, ${bunY}px)`;
  }

  function endDrag() {
    window.removeEventListener('mousemove', onDrag);
    window.removeEventListener('mouseup', endDrag);
    bun.classList.remove('dragging');

    // Snap back with a spring wiggle
    bun.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
    bun.style.transform = '';
    setTimeout(() => { bun.style.transition = ''; isDragging = false; }, 650);
  }
</script>
</body>
</html>
